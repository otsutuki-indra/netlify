<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ʜᴇʟʟ ᴄᴏʀᴘ — WE BUILD WHAT OTHERS FEAR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --hell-red: #FF0022;
    --hell-orange: #FF4500;
    --ash: #1A1A1A;
    --void: #0A0A0A;
    --smoke: #2D2D2D;
    --white: #F0EDE8;
    --dim: #888888;
    --glow: rgba(255,0,34,0.5);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--void);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    cursor: none;
    overflow-x: hidden;
  }

  /* 🔥 FIXED & LIGHT CURSOR */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--hell-red);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px var(--glow);
    will-change: transform;
    transition: transform 0.08s ease;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,0,34,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    will-change: transform;
    transition: all 0.2s ease;
  }

  /* LIGHT NOISE + SCANLINES */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9000;
    opacity: 0.25;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 6px);
    pointer-events: none;
    z-index: 9001;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    border-bottom: 1px solid rgba(255,0,34,0.15);
    background: rgba(10,10,10,0.9);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.15em;
    color: var(--hell-red);
    text-shadow: 0 0 20px var(--glow);
  }
  .logo span { color: var(--white); }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }
  .nav-links a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--hell-red); }

  .nav-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: 1px solid var(--hell-red);
    color: var(--hell-red);
    background: transparent;
    padding: 10px 24px;
    transition: all 0.3s;
  }
  .nav-btn:hover {
    background: var(--hell-red);
    color: var(--void);
  }

  /* HERO - Reduced Animations */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 120px 60px 60px;
  }
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,0,34,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,34,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .hero-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,0,34,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .hero-content { position: relative; z-index: 10; text-align: center; max-width: 1000px; }

  .hero-tag { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 0.4em; color: var(--hell-red); margin-bottom: 24px; }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 12vw, 11rem);
    line-height: 0.9;
    letter-spacing: 0.03em;
    color: var(--white);
  }
  .hero-title .red { color: var(--hell-red); }

  .hero-sub {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--dim);
    margin-top: 32px;
    line-height: 1.8;
  }

  .hero-btns {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 48px;
  }
  .btn-primary, .btn-secondary {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 16px 40px;
    cursor: none;
    transition: all 0.3s;
  }
  .btn-primary {
    background: var(--hell-red);
    color: var(--void);
    border: none;
  }
  .btn-secondary {
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(240,237,232,0.3);
  }

  /* PARTICLES - Reduced */
  .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--hell-red);
    border-radius: 50%;
    box-shadow: 0 0 4px var(--glow);
    animation: rise 12s linear infinite;
  }
  @keyframes rise {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-150px) translateX(30px); opacity: 0; }
  }

  /* SERVICES, ABOUT, etc. - Keep same but lighter hover */
  .service-card:hover, .project-card:hover {
    transform: translateY(-3px);
  }

  /* Other sections remain same (only removed heavy animations) */
</style>
</head>
<body>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
<nav>
  <div class="logo">HELL<span>CORP</span></div>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#work">Work</a></li>
    <li><a href="#process">Process</a></li>
  </ul>
  <button class="nav-btn" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">IGNITE PROJECT</button>
</nav>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- HERO -->
<section class="hero">
  <div class="grid-bg"></div>
  <div class="hero-glow"></div>
 
  <div class="hero-content">
    <div class="hero-tag">// EST. 2019 — DIGITAL WARFARE DIVISION</div>
    <h1 class="hero-title">
      <span>WE BUILD</span><br>
      <span class="red">WHAT OTHERS</span><br>
      <span>FEAR</span>
    </h1>
    <p class="hero-sub">Hellcorp engineers the impossible. Bleeding-edge tech solutions forged in the fires of innovation.</p>
    <div class="hero-btns">
      <a href="#services" class="btn-primary">EXPLORE SERVICES</a>
      <a href="#work" class="btn-secondary">VIEW OUR WORK</a>
    </div>
  </div>
</section>

<!-- Rest of your HTML remains exactly the same (from STATS to FOOTER) -->
<!-- Just paste your original sections below this point -->

<script>
// FIXED FAST CURSOR
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
  ring.style.left = e.clientX + 'px';
  ring.style.top = e.clientY + 'px';
});

document.querySelectorAll('a, button, .service-card, .step-num, .tag, .project-card').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
    ring.style.borderColor = 'rgba(255,0,34,0.9)';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
    ring.style.borderColor = 'rgba(255,0,34,0.4)';
  });
});

// LIGHT PARTICLES (only 15)
const pContainer = document.getElementById('particles');
for (let i = 0; i < 15; i++) {
  const p = document.createElement('div');
  p.classList.add('particle');
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (Math.random() * 10 + 8) + 's';
  p.style.animationDelay = (Math.random() * 8) + 's';
  pContainer.appendChild(p);
}
</script>

</body>
</html>
