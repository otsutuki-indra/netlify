    <style>

        }
        .gold-btn {
            background: linear-gradient(to right, #fbbf24, #d97706);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gold-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(217, 119, 6, 0.4);
        }
    </style>
</head>
