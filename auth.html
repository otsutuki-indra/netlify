<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTH // ACCESS HELLCORP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --hell-red: #FF0022;
    --void: #0A0A0A;
    --ash: #1A1A1A;
    --glow: rgba(255,0,34,0.6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--void);
    color: #F0EDE8;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    opacity: 0.5;
    z-index: 1;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,0,34,0.03) 3px, rgba(255,0,34,0.03) 6px);
    z-index: 2;
  }

  .auth-container {
    width: 440px;
    background: var(--ash);
    border: 1px solid rgba(255,0,34,0.3);
    padding: 60px 50px;
    position: relative;
    z-index: 10;
    box-shadow: 0 0 80px var(--glow);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    text-align: center;
    color: var(--hell-red);
    margin-bottom: 50px;
    text-shadow: 0 0 40px var(--glow);
    letter-spacing: 0.15em;
  }
  .logo span { color: #F0EDE8; }

  .tab-bar {
    display: flex;
    border-bottom: 1px solid rgba(255,0,34,0.3);
    margin-bottom: 40px;
  }
  .tab {
    flex: 1;
    padding: 16px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    letter-spacing: 0.25em;
    color: #888;
    cursor: none;
    transition: all 0.3s;
  }
  .tab.active {
    color: var(--hell-red);
    border-bottom: 3px solid var(--hell-red);
  }

  .form-group {
    margin-bottom: 32px;
    position: relative;
  }
  .form-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,0,34,0.4);
    padding: 14px 0;
    color: #F0EDE8;
    font-size: 1.1rem;
    outline: none;
  }
  .form-input:focus {
    border-bottom-color: var(--hell-red);
  }
  .form-label {
    position: absolute;
    top: -6px;
    left: 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--hell-red);
    opacity: 0;
    transition: all 0.3s;
  }
  .form-input:focus ~ .form-label,
  .form-input:not(:placeholder-shown) ~ .form-label {
    opacity: 1;
    top: -24px;
  }

  .btn-auth {
    width: 100%;
    background: var(--hell-red);
    color: #0A0A0A;
    border: none;
    padding: 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 20px;
    cursor: none;
    transition: all 0.4s;
  }
  .btn-auth:hover {
    background: #FF4500;
    box-shadow: 0 0 60px var(--glow);
    transform: translateY(-3px);
  }

  .forgot {
    text-align: center;
    margin-top: 30px;
    font-size: 0.85rem;
    color: #666;
  }
  .forgot a {
    color: var(--hell-red);
    text-decoration: none;
  }

  .hell-symbol {
    position: absolute;
    top: 25px;
    right: 35px;
    font-size: 9rem;
    color: rgba(255,0,34,0.07);
    font-family: 'Bebas Neue', sans-serif;
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="auth-container">
    <div class="hell-symbol">HC</div>
    
    <div class="logo">HELL<span>CORP</span></div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab(0)">LOGIN</div>
      <div class="tab" onclick="switchTab(1)">REGISTER</div>
    </div>

    <!-- Login -->
    <div id="login-form">
      <div class="form-group">
        <input type="text" class="form-input" placeholder="ACCESS ID" id="login-user">
        <label class="form-label">USERNAME / EMAIL</label>
      </div>
      <div class="form-group">
        <input type="password" class="form-input" placeholder="••••••••" id="login-pass">
        <label class="form-label">PASSWORD</label>
      </div>
      <button class="btn-auth" onclick="fakeLogin()">INITIATE ACCESS →</button>
      <div class="forgot"><a href="#">FORGOT PROTOCOL?</a></div>
    </div>

    <!-- Register -->
    <div id="register-form" style="display:none;">
      <div class="form-group">
        <input type="text" class="form-input" placeholder="CALLSIGN" id="reg-user">
        <label class="form-label">USERNAME</label>
      </div>
      <div class="form-group">
        <input type="email" class="form-input" placeholder="inferno@hellcorp.io" id="reg-email">
        <label class="form-label">SECURE EMAIL</label>
      </div>
      <div class="form-group">
        <input type="password" class="form-input" placeholder="••••••••" id="reg-pass">
        <label class="form-label">NEW PASSWORD</label>
      </div>
      <button class="btn-auth" onclick="fakeRegister()">BURN NEW ACCOUNT →</button>
    </div>
  </div>

  <script>
    function switchTab(n) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
      document.getElementById('login-form').style.display = n===0 ? 'block' : 'none';
      document.getElementById('register-form').style.display = n===1 ? 'block' : 'none';
    }

    function fakeLogin() {
      alert("🔥 ACCESS GRANTED — WELCOME BACK TO HELLCORP");
      setTimeout(() => window.location.href = '/', 800);
    }

    function fakeRegister() {
      alert("🔥 ACCOUNT FORGED — YOU ARE NOW PART OF HELLCORP");
      setTimeout(() => window.location.href = '/', 1000);
    }

    // Custom red cursor
    const cursor = document.createElement('div');
    cursor.style.cssText = 'position:fixed;width:14px;height:14px;border:2px solid #FF0022;border-radius:50%;pointer-events:none;z-index:9999;mix-blend-mode:difference;';
    document.body.appendChild(cursor);
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
