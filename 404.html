<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — SIGNAL LOST | HELLCORP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --hell-red: #FF0022;
    --hell-orange: #FF4500;
    --void: #0A0A0A;
    --ash: #1A1A1A;
    --smoke: #2D2D2D;
    --glow: rgba(255,0,34,0.6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--void);
    color: #F0EDE8;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: none;
  }

  /* Noise + Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.4;
    z-index: 1;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    z-index: 2;
    pointer-events: none;
  }

  .container {
    text-align: center;
    z-index: 10;
    position: relative;
  }

  .error-code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18rem;
    line-height: 0.8;
    color: var(--hell-red);
    text-shadow: 0 0 80px var(--glow), 0 0 160px var(--glow);
    letter-spacing: -0.05em;
    animation: glitch 1.5s infinite;
  }

  .error-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.8rem;
    letter-spacing: 0.4em;
    color: #888;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .message {
    font-size: 1.3rem;
    max-width: 620px;
    margin: 0 auto 50px;
    color: #aaa;
    line-height: 1.6;
  }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    background: transparent;
    color: var(--hell-red);
    border: 2px solid var(--hell-red);
    padding: 18px 50px;
    cursor: none;
    transition: all 0.4s;
    text-decoration: none;
    display: inline-block;
  }
  .btn:hover {
    background: var(--hell-red);
    color: #0A0A0A;
    box-shadow: 0 0 50px var(--glow);
    transform: scale(1.05);
  }

  .hell-symbol {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 6rem;
    color: var(--hell-red);
    opacity: 0.15;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
    animation: pulse 4s infinite;
  }

  @keyframes glitch {
    0%,100% { transform: translate(0); }
    20% { transform: translate(-4px, 4px); }
    40% { transform: translate(-4px, -4px); }
    60% { transform: translate(4px, 4px); }
    80% { transform: translate(4px, -4px); }
  }

  @keyframes pulse {
    0%,100% { opacity: 0.12; }
    50% { opacity: 0.25; }
  }

  .scanline {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(transparent, var(--hell-red), transparent);
    animation: scan 6s linear infinite;
    opacity: 0.3;
  }

  @keyframes scan {
    0% { transform: translateY(-100vh); }
    100% { transform: translateY(300vh); }
  }
</style>
</head>
<body>

  <div class="hell-symbol">HF</div>
  <div class="scanline"></div>

  <div class="container">
    <div class="error-code">404</div>
    <div class="error-text">SIGNAL LOST // ACCESS DENIED</div>
    <p class="message">
      The page you are looking for has been burned.<br>
      It no longer exists in this realm.
    </p>
    <a href="/" class="btn">RETURN TO HELLCORP →</a>
  </div>

  <script>
    // Custom cursor
    const cursor = document.createElement('div');
    cursor.style.position = 'fixed';
    cursor.style.width = '14px';
    cursor.style.height = '14px';
    cursor.style.border = '2px solid #FF0022';
    cursor.style.borderRadius = '50%';
    cursor.style.pointerEvents = 'none';
    cursor.style.zIndex = '9999';
    cursor.style.mixBlendMode = 'difference';
    document.body.appendChild(cursor);

    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
